<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LUXORA TRACK — Premium Jewellery Item Tracking System</title>
    <meta name="description" content="LUXORA TRACK — Enterprise jewellery inventory management and item tracking platform." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!--
      Inline critical CSS: applies instantly, before any external stylesheet
      or JS has loaded, so the very first paint is dark instead of a white
      flash while the bundle downloads and parses.
    -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background-color: #050505;
      }
      #root {
        min-height: 100vh;
      }
      /* Static splash shown until React mounts and takes over #root */
      .boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background-color: #050505;
      }
      .boot-splash__mark {
        width: 56px;
        height: 56px;
        border-radius: 16px;
        background: linear-gradient(135deg, #d4af37, #b8941f);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 8px 32px rgba(212, 175, 55, 0.3);
        animation: boot-pulse 1.6s ease-in-out infinite;
      }
      .boot-splash__mark svg {
        width: 28px;
        height: 28px;
      }
      .boot-splash__text {
        font-family: "Cinzel", serif;
        font-size: 0.95rem;
        letter-spacing: 0.15em;
        color: #d4af37;
        text-transform: uppercase;
      }
      @keyframes boot-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(0.92); opacity: 0.75; }
      }
    </style>
  </head>
  <body>
    <script>
      // Test-environment helper (no effect in normal use): headless or hidden
      // browser tabs pause requestAnimationFrame, which freezes UI animations.
      // Appending ?rafshim to the URL drives frames from timers instead so
      // automated QA can exercise the app.
      if (location.search.indexOf("rafshim") !== -1) {
        window.requestAnimationFrame = function (cb) {
          return setTimeout(function () { cb(performance.now()); }, 16);
        };
        window.cancelAnimationFrame = function (id) { clearTimeout(id); };
      }
    </script>
    <div id="root">
      <!--
        Static fallback markup, visible immediately on first paint.
        React replaces this the instant createRoot(...).render(...) runs
        in main.jsx, so it's only ever seen for the brief gap before the
        JS bundle finishes loading — no more blank white screen.
      -->
      <div class="boot-splash">
        <div class="boot-splash__mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="#0a0a0a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 3h12l4 6-10 12L2 9Z" />
            <path d="M2 9h20" />
            <path d="M12 3v18" />
          </svg>
        </div>
        <div class="boot-splash__text">Luxora Track</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
